<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Get a Quote | Construction Company</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="./css/tailwind.js"></script>
</head>

<body class="bg-gray-100 text-gray-800">

<!-- HERO SECTION -->
<section class="relative h-[320px] bg-cover bg-center"
  style="background-image: url('https://images.unsplash.com/photo-1503387762-592deb58ef4e')">
  <div class="absolute inset-0 bg-black/60 flex items-center"><div class="max-w-7xl mx-auto px-6 py-28 text-center">
    <h1 class="text-4xl md:text-5xl font-bold mb-4 text-white">
      Get a Quote
    </h1>
    <p class="text-white max-w-2xl mx-auto">
      Tell us about your project and receive a tailored construction estimate.
    </p>
  </div></div>

  <!-- Wave Divider -->
 
</section>

<!-- QUOTE FORM SECTION -->
<section class="max-w-6xl mx-auto px-6 py-20">
  <div class="bg-white rounded-xl shadow-xl p-10">

    <h2 class="text-3xl font-bold mb-8 text-center">
      Project Information
    </h2>

    <form class="grid grid-cols-1 md:grid-cols-2 gap-6">

      <!-- Name -->
      <input type="text" placeholder="Full Name"
        class="border rounded-md px-4 py-3 focus:ring-2 focus:ring-amber-500 outline-none">

      <!-- Email -->
      <input type="email" placeholder="Email Address"
        class="border rounded-md px-4 py-3 focus:ring-2 focus:ring-amber-500 outline-none">

      <!-- Phone -->
      <input type="tel" placeholder="Phone Number"
        class="border rounded-md px-4 py-3 focus:ring-2 focus:ring-amber-500 outline-none">

      <!-- Project Type -->
      <select
        class="border rounded-md px-4 py-3 focus:ring-2 focus:ring-amber-500 outline-none">
        <option>Select Project Type</option>
        <option>Residential Construction</option>
        <option>Commercial Building</option>
        <option>Renovation</option>
        <option>Industrial Facility</option>
      </select>

      <!-- Budget -->
      <select
        class="border rounded-md px-4 py-3 focus:ring-2 focus:ring-amber-500 outline-none">
        <option>Estimated Budget</option>
        <option>$10k – $50k</option>
        <option>$50k – $200k</option>
        <option>$200k+</option>
      </select>

      <!-- Timeline -->
      <select
        class="border rounded-md px-4 py-3 focus:ring-2 focus:ring-amber-500 outline-none">
        <option>Project Timeline</option>
        <option>Immediate</option>
        <option>1–3 Months</option>
        <option>3–6 Months</option>
      </select>

      <!-- Message -->
      <textarea rows="5"
        placeholder="Describe your project..."
        class="md:col-span-2 border rounded-md px-4 py-3 focus:ring-2 focus:ring-amber-500 outline-none"></textarea>

      <!-- Submit Button -->
      <div class="md:col-span-2 text-center mt-6">
        <button
          class="bg-amber-500 hover:bg-amber-600 text-white font-semibold px-10 py-4 rounded-md transition">
          Request Quote
        </button>
      </div>

    </form>
  </div>
</section>

<!-- TRUST SECTION -->
<section class="bg-slate-900 text-white py-12">
  <div class="max-w-6xl mx-auto px-6 grid md:grid-cols-3 gap-6 text-center">
    <div>
      <h3 class="font-bold text-lg">Free Consultation</h3>
      <p class="text-gray-400 text-sm">No hidden charges</p>
    </div>
    <div>
      <h3 class="font-bold text-lg">Expert Team</h3>
      <p class="text-gray-400 text-sm">Industry professionals</p>
    </div>
    <div>
      <h3 class="font-bold text-lg">Fast Response</h3>
      <p class="text-gray-400 text-sm">We value your time</p>
    </div>
  </div>
</section>

</body>
</html>
